name: ML Recommendation Pipeline

# =====================================================
# TRIGGERS (ONLY MANUAL + CRON)
# =====================================================
on:
  workflow_dispatch:

  schedule:
    - cron: "30 22 * * *"   # 4:00 AM IST

# =====================================================
# JOBS
# =====================================================
jobs:
  run-ml-pipeline:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout Code
      - name: 📦 Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Step 3: Install Dependencies
      - name: 📚 Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      # Step 4: Run ML Pipeline
      - name: 🚀 Run ML Pipeline
        env:
          EVENTS_DB_URL: ${{ secrets.EVENTS_DB_URL }}
          PRODUCT_DB_URL: ${{ secrets.PRODUCT_DB_URL }}
          RECO_DB_URL: ${{ secrets.RECO_DB_URL }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
        
        run: |
          echo "=============================="
          echo "🚀 STARTING ML PIPELINE"
          echo "=============================="

          python pipeline/run_pipeline.py

          echo "=============================="
          echo "✅ PIPELINE COMPLETED"
          echo "=============================="
